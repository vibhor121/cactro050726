<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=420" />
  <title>Highlight Saver</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 420px;
      min-height: 520px;
      max-height: 600px;
      overflow: hidden;
      background: #020617;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    main { display: flex; flex-direction: column; height: 600px; padding: 16px; gap: 12px; }
    .card {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 16px;
    }
    .header { display: flex; align-items: center; gap: 10px; }
    .icon {
      background: rgba(34, 211, 238, 0.15);
      color: #67e8f9;
      border-radius: 12px;
      padding: 8px;
      font-size: 18px;
    }
    h1 { font-size: 18px; font-weight: 600; }
    .sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    label { display: block; font-size: 14px; color: #cbd5e1; margin-bottom: 8px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #020617;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: rgba(34, 211, 238, 0.5); }
    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #020617;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      margin-bottom: 10px;
    }
    select:focus { border-color: rgba(34, 211, 238, 0.5); }
    .hint { font-size: 11px; color: #64748b; margin-top: 8px; line-height: 1.5; }
    .list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 4px;
    }
    .empty {
      border: 1px dashed #1e293b;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.6;
    }
    .item {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 12px;
    }
    .item-top { display: flex; justify-content: space-between; gap: 10px; }
    .item-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #67e8f9;
      text-decoration: none;
      word-break: break-word;
    }
    .item-title:hover { color: #a5f3fc; }
    .item-text { margin-top: 6px; font-size: 14px; line-height: 1.5; color: #e2e8f0; }
    .item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      gap: 8px;
    }
    .item-date { font-size: 11px; color: #64748b; }
    .delete-btn {
      background: transparent;
      border: 1px solid #334155;
      color: #cbd5e1;
      border-radius: 999px;
      padding: 6px 8px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }
    .delete-btn:hover { border-color: #f87171; color: #fca5a5; }
    .summarize-btn {
      background: rgba(34, 211, 238, 0.15);
      color: #67e8f9;
      border: none;
      border-radius: 999px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
    }
    .summarize-btn:hover { background: rgba(34, 211, 238, 0.25); }
    .summarize-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .summary {
      margin-top: 10px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(2, 6, 23, 0.7);
      border: 1px solid #1e293b;
      font-size: 13px;
      line-height: 1.5;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <main>
    <div class="card header">
      <div class="icon">✦</div>
      <div>
        <h1>Highlight Saver</h1>
        <p class="sub" id="count-label">Loading...</p>
      </div>
    </div>

    <div class="card">
      <label for="ai-provider">AI for Summarize (optional)</label>
      <select id="ai-provider">
        <option value="gemini">Google Gemini (Free)</option>
        <option value="openai">OpenAI (paid)</option>
      </select>
      <label for="api-key">API key</label>
      <input id="api-key" type="password" placeholder="Paste your Gemini API key here" autocomplete="off" />
      <p class="hint">
        Get a <strong>free</strong> key at
        <a href="https://aistudio.google.com/apikey" target="_blank" rel="noreferrer" style="color:#67e8f9">aistudio.google.com/apikey</a>.
        Paste the <strong>full</strong> key (starts with AIza). No spaces.
      </p>
    </div>

    <div class="list" id="list"></div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
